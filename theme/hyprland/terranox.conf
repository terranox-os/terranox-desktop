# TerranoxOS Hyprland Configuration — Obsidian Dark
#
# Source this from ~/.config/hypr/hyprland.conf:
#   source = /path/to/terranox-desktop/theme/hyprland/terranox.conf

# ── General ──────────────────────────────────────────

general {
    gaps_in = 6
    gaps_out = 12
    border_size = 2
    col.active_border = rgba(8b5cf6ff) rgba(a78bfaff) 45deg
    col.inactive_border = rgba(1e2030ff)
    layout = dwindle
}

# ── Decoration ───────────────────────────────────────

decoration {
    rounding = 12

    blur {
        enabled = true
        size = 8
        passes = 2
        noise = 0.02
        contrast = 1.0
        brightness = 0.9
        vibrancy = 0.2
        new_optimizations = true
    }

    shadow {
        enabled = true
        range = 20
        render_power = 3
        color = rgba(0a0b1488)
    }
}

# ── Animations ───────────────────────────────────────

animations {
    enabled = true

    bezier = obsidian, 0.05, 0.9, 0.1, 1.05

    animation = windows, 1, 5, obsidian
    animation = windowsOut, 1, 5, default, popin 80%
    animation = border, 1, 8, default
    animation = borderangle, 1, 6, default
    animation = fade, 1, 5, default
    animation = workspaces, 1, 4, default
}

# ── Input ────────────────────────────────────────────

input {
    kb_layout = us
    follow_mouse = 1
    sensitivity = 0

    touchpad {
        natural_scroll = true
    }
}

# ── Layout ───────────────────────────────────────────

dwindle {
    pseudotile = true
    preserve_split = true
}

# ── Keybindings ──────────────────────────────────────

$mod = SUPER

bind = $mod, Return, exec, foot
bind = $mod, Q, killactive
bind = $mod, M, exit
bind = $mod, E, exec, nautilus
bind = $mod, V, togglefloating
bind = $mod, Space, exec, trx-launcher  # TerranoxOS app launcher
bind = $mod, P, pseudo
bind = $mod, J, togglesplit
bind = $mod, F, fullscreen

# Move focus
bind = $mod, left, movefocus, l
bind = $mod, right, movefocus, r
bind = $mod, up, movefocus, u
bind = $mod, down, movefocus, d

# Workspaces
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5

bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5

# Mouse
bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow

# ── Autostart ────────────────────────────────────────

exec-once = trx-shell       # TerranoxOS shell (top bar + dock)
