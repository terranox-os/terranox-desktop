# TerranoxOS Hyprland Configuration — Sentinel Variant
#
# Crimson accent, SENTINEL branding. Source AFTER terranox.conf:
#   source = /path/to/experiments/desktop/theme/hyprland/terranox.conf
#   source = /path/to/experiments/desktop/theme/hyprland/sentinel.conf

# Override accent to crimson
general {
    col.active_border = rgba(ef4444ff) rgba(f87171ff) 45deg
}

# Red-tinted shadows
decoration {
    shadow {
        color = rgba(ef444422)
    }
}

# Autostart Sentinel dashboard
exec-once = sentinel-mock    # Mock daemon (replaced by real daemon later)
